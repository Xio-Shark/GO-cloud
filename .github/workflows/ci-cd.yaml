name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
      - name: Check fmt
        run: test -z "$(gofmt -l cmd internal pkg)"
      - name: Unit test
        run: go test -count=1 ./...

  build-and-push:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-server, scheduler, worker, notifier]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
          tags: ghcr.io/${{ github.repository_owner }}/go-cloud-${{ matrix.service }}:${{ github.sha }}

  update-dev-gitops:
    if: github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
      - name: Update dev overlays
        run: |
          go run ./cmd/release-updater -environment dev -app api-server -version ${{ github.sha }}
          go run ./cmd/release-updater -environment dev -app scheduler -version ${{ github.sha }}
          go run ./cmd/release-updater -environment dev -app worker -version ${{ github.sha }}
          go run ./cmd/release-updater -environment dev -app notifier -version ${{ github.sha }}
      - name: Commit overlays
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deployments/k8s/overlays/dev/patch-images.yaml
          git commit -m "ci: update dev overlays to ${GITHUB_SHA}" || exit 0
          git push
