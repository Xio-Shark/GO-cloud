name: go-cloud

services:
  mysql:
    image: mysql:8.0.36
    container_name: go-cloud-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deployments/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2.5-alpine
    container_name: go-cloud-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: api-server
    container_name: go-cloud-api-server
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8080
      MYSQL_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=UTC
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      LOG_LEVEL: ${LOG_LEVEL}
      GITOPS_OVERLAYS_ROOT: ${GITOPS_OVERLAYS_ROOT}
      HEALTHCHECK_URL: http://127.0.0.1:8080/healthz
    ports:
      - "${API_PORT}:8080"
    volumes:
      - ./deployments:/app/deployments
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: scheduler
    container_name: go-cloud-scheduler
    restart: unless-stopped
    environment:
      ADMIN_ADDR: :9091
      MYSQL_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=UTC
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      LOG_LEVEL: ${LOG_LEVEL}
      SCHEDULER_SCAN_INTERVAL: ${SCHEDULER_SCAN_INTERVAL}
      HEALTHCHECK_URL: http://127.0.0.1:9091/healthz
    ports:
      - "${SCHEDULER_ADMIN_PORT}:9091"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: worker
    container_name: go-cloud-worker
    restart: unless-stopped
    environment:
      ADMIN_ADDR: :9092
      MYSQL_DSN: ${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=UTC
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      LOG_LEVEL: ${LOG_LEVEL}
      QUEUE_POP_TIMEOUT: ${QUEUE_POP_TIMEOUT}
      EXECUTOR_HTTP_TIMEOUT: ${EXECUTOR_HTTP_TIMEOUT}
      WORKER_ID: worker-1
      KUBERNETES_NAMESPACE: ${KUBERNETES_NAMESPACE}
      CONTAINER_JOB_POLL_INTERVAL: ${CONTAINER_JOB_POLL_INTERVAL}
      CONTAINER_JOB_TTL_SECONDS: ${CONTAINER_JOB_TTL_SECONDS}
      CONTAINER_JOB_IMAGE_PULL_POLICY: ${CONTAINER_JOB_IMAGE_PULL_POLICY}
      CONTAINER_JOB_SERVICE_ACCOUNT: ${CONTAINER_JOB_SERVICE_ACCOUNT}
      HEALTHCHECK_URL: http://127.0.0.1:9092/healthz
    ports:
      - "${WORKER_ADMIN_PORT}:9092"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  notifier:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: notifier
    container_name: go-cloud-notifier
    restart: unless-stopped
    environment:
      ADMIN_ADDR: :9093
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      LOG_LEVEL: ${LOG_LEVEL}
      QUEUE_POP_TIMEOUT: ${QUEUE_POP_TIMEOUT}
      NOTIFIER_REQUEST_TIMEOUT: ${NOTIFIER_REQUEST_TIMEOUT}
      HEALTHCHECK_URL: http://127.0.0.1:9093/healthz
    ports:
      - "${NOTIFIER_ADMIN_PORT}:9093"
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.3
    container_name: go-cloud-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-server
      - scheduler
      - worker
      - notifier

  nginx:
    image: nginx:1.27.4-alpine
    container_name: go-cloud-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./deployments/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-server

  grafana:
    image: grafana/grafana:11.2.0
    container_name: go-cloud-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - ./deployments/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deployments/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  redis_data:
  grafana_data:
