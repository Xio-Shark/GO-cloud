apiVersion: v1
kind: ConfigMap
metadata:
  name: go-cloud-config
  namespace: go-cloud
data:
  REDIS_ADDR: redis.go-cloud.svc.cluster.local:6379
  REDIS_DB: "0"
  LOG_LEVEL: info
  SCHEDULER_SCAN_INTERVAL: 5s
  QUEUE_POP_TIMEOUT: 5s
  NOTIFIER_REQUEST_TIMEOUT: 10s
  EXECUTOR_HTTP_TIMEOUT: 15s
  GRACEFUL_SHUTDOWN_TIMEOUT: 10s
  KUBERNETES_NAMESPACE: go-cloud
  CONTAINER_JOB_POLL_INTERVAL: 2s
  CONTAINER_JOB_TTL_SECONDS: "300"
  CONTAINER_JOB_IMAGE_PULL_POLICY: IfNotPresent
  CONTAINER_JOB_SERVICE_ACCOUNT: go-cloud-worker
