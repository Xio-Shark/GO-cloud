apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifier
  namespace: go-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notifier
  template:
    metadata:
      labels:
        app: notifier
    spec:
      containers:
        - name: notifier
          image: ghcr.io/example/go-cloud-notifier:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9093
          env:
            - name: ADMIN_ADDR
              value: ":9093"
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: REDIS_ADDR
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: go-cloud-secret
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: REDIS_DB
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: LOG_LEVEL
            - name: QUEUE_POP_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: QUEUE_POP_TIMEOUT
            - name: NOTIFIER_REQUEST_TIMEOUT
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: NOTIFIER_REQUEST_TIMEOUT
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9093
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9093
