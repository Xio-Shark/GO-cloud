apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: go-cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/example/go-cloud-scheduler:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9091
          env:
            - name: ADMIN_ADDR
              value: ":9091"
            - name: MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: go-cloud-secret
                  key: MYSQL_DSN
            - name: REDIS_ADDR
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: REDIS_ADDR
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: go-cloud-secret
                  key: REDIS_PASSWORD
            - name: REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: REDIS_DB
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: LOG_LEVEL
            - name: SCHEDULER_SCAN_INTERVAL
              valueFrom:
                configMapKeyRef:
                  name: go-cloud-config
                  key: SCHEDULER_SCAN_INTERVAL
          readinessProbe:
            httpGet:
              path: /readyz
              port: 9091
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9091
