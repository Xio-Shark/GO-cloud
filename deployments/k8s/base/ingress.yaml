apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: go-cloud
  namespace: go-cloud
spec:
  rules:
    - host: go-cloud.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-server
                port:
                  number: 8080
