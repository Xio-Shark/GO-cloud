global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-server
    static_configs:
      - targets: ["api-server:8080"]

  - job_name: scheduler
    static_configs:
      - targets: ["scheduler:9091"]

  - job_name: worker
    static_configs:
      - targets: ["worker:9092"]

  - job_name: notifier
    static_configs:
      - targets: ["notifier:9093"]
